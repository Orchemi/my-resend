name: CI

on:
  pull_request:
  push:
    branches: [develop, production]

# Cancel previous runs of the same PR / branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        # --runInBand keeps the suite single-process so memory cleanup is
        # deterministic. The earlier WaitlistSignup pending-leak ignore
        # pattern was removed once the waitlist surface itself was deleted
        # (see docs/plan/012-remove-waitlist.md).
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
